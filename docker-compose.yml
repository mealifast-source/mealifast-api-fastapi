version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: mealifast-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mealifast
      MYSQL_USER: mealifast
      MYSQL_PASSWORD: mealifast_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - mealifast-network

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: mealifast-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5
    networks:
      - mealifast-network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mealifast-api
    environment:
      DATABASE_URL: mysql+pymysql://mealifast:mealifast_pass@mysql:3306/mealifast
      REDIS_URL: redis://redis:6379/0
      REDIS_ASYNC_URL: redis://redis:6379/1
      JWT_SECRET_KEY: your-secret-key-change-in-production
      DEBUG: "true"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__
    networks:
      - mealifast-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mysql_data:
  redis_data:

networks:
  mealifast-network:
    driver: bridge
